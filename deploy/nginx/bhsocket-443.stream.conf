map "$ssl_preread_server_name:$ssl_preread_alpn_protocols" $bhsocket_443_backend {
    ~^www\.bhsocket\.io: 127.0.0.1:9443;
    ~:.*\bh2\b          127.0.0.1:9443;
    ~:.*\bhttp/1.1\b    127.0.0.1:9443;
    default              127.0.0.1:7350;
}

server {
    listen 443;
    listen [::]:443;
    proxy_pass $bhsocket_443_backend;
    ssl_preread on;
    proxy_connect_timeout 10s;
    proxy_timeout 1h;
}
